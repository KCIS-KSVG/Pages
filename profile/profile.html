<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KSVG | 账户管理</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@700;800&family=Georgia&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <!-- 请根据你的实际目录层级调整图标路径 -->
    <link rel="icon" href="../assets/ksvg-logo.png?v=2" type="image/png">
    <link rel="shortcut icon" href="../assets/ksvg-logo.png?v=2" type="image/png">

    <style>
        /* --- CORE VARIABLES --- */
        :root {
            --brand-primary: #002b49;  
            --brand-secondary: #c41230;
            --banner-bg: #f0f0f0;
            --banner-text: #1b1b1b;
            --link-blue: #005ea2;
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --border-color: #e2e8f0;
            --text-dark: #0f172a;
            --text-muted: #475569;
            --header-height: 64px; 
            --transition-speed: 0.3s;
            --secure-green: #10b981;
            --error-red: #ef4444;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg-color); color: var(--text-dark); line-height: 1.6; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }
        a { text-decoration: none; color: inherit; }
        main { flex-grow: 1; }

        /* A11Y Outline */
        a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, [tabindex]:focus-visible {
            outline: 0.25rem solid #2491ff !important; outline-offset: 0.125rem !important; border-radius: 4px;
        }

        /* 渐变分割线 */
        .brand-strip { height: 4px; width: 100%; background: linear-gradient(90deg, var(--brand-primary) 60%, var(--brand-secondary) 100%); }

        /* ========================================================= */
        /* AUTH DROPDOWN (Injects into navigation.html placeholder)  */
        /* ========================================================= */
        .user-avatar-btn { background: none; border: none; font-size: 0.85rem; font-weight: 600; color: var(--text-dark); letter-spacing: 0.5px; cursor: pointer; display: flex; align-items: center; gap: 6px; transition: color 0.2s; font-family: inherit; }
        .user-avatar-btn:hover { color: var(--brand-primary); }
        .user-avatar-btn i { font-size: 1.2rem; }
        
        .auth-dropdown-desktop { position: absolute; top: 100%; right: 0; margin-top: 10px; width: 220px; background: white; border: 1px solid var(--border-color); box-shadow: 0 4px 20px rgba(0,0,0,0.08); border-radius: 6px; padding: 10px; display: none; flex-direction: column; z-index: 2000; animation: fadeIn 0.2s ease-out; }
        .auth-dropdown-desktop.show { display: flex; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(-10px); } to { opacity: 1; transform: translateY(0); } }
        .auth-dropdown-email { font-size: 0.8rem; color: var(--text-muted); padding: 8px 10px; border-bottom: 1px solid #f1f5f9; margin-bottom: 5px; word-break: break-all; }
        .auth-dropdown-item { padding: 10px; font-size: 0.85rem; font-weight: 500; color: var(--text-dark); cursor: pointer; border-radius: 4px; display: flex; align-items: center; gap: 8px; transition: background 0.2s; }
        .auth-dropdown-item:hover { background-color: #f1f5f9; }
        .auth-dropdown-item.logout { color: var(--error-red); }
        .auth-dropdown-item.logout:hover { background-color: #fef2f2; }

        /* Mobile Account Layout */
        .m-acc-email { font-size: 0.85rem; color: var(--text-muted); margin-bottom: 15px; text-align: left; word-break: break-all; }
        .m-acc-btn { display: flex; align-items: center; justify-content: center; gap: 8px; width: 100%; padding: 14px; text-align: center; font-size: 0.95rem; font-family: inherit; border-radius: 6px; cursor: pointer; transition: all 0.2s; }
        .m-acc-btn.logout { background: white; color: var(--error-red); border: 1px solid #fecaca; font-weight: 600;}
        .m-acc-btn.logout:active { background: #fef2f2; transform: scale(0.98); }

        /* ========================================================= */
        /* PROFILE LAYOUT & FORM (USWDS & NNGroup Guidelines)        */
        /* ========================================================= */
        .profile-wrapper { max-width: 900px; margin: 50px auto 80px; padding: 0 20px; animation: fadeIn 0.4s ease-out; }
        .profile-page-header { margin-bottom: 35px; display: flex; align-items: center; gap: 25px; }
        .profile-avatar-large { width: 85px; height: 85px; background-color: var(--brand-primary); color: white; font-size: 2.5rem; font-weight: 700; border-radius: 50%; display: flex; align-items: center; justify-content: center; box-shadow: 0 4px 15px rgba(0, 43, 73, 0.2); text-transform: uppercase; }
        .profile-title h1 { font-family: 'Georgia', serif; font-size: 2.2rem; color: var(--brand-primary); margin-bottom: 5px; letter-spacing: 0.5px; }
        .profile-title p { color: var(--text-muted); font-size: 1rem; }

        .form-section { background: var(--surface-color); border: 1px solid var(--border-color); border-radius: 12px; padding: 40px 45px; margin-bottom: 25px; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05); }
        .form-section-title { font-size: 1.25rem; font-weight: 700; color: var(--text-dark); margin-bottom: 25px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid var(--border-color); padding-bottom: 15px; }
        .form-section-title i { color: var(--brand-primary); font-size: 1.4rem; }

        .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 20px 30px; }
        .form-group { display: flex; flex-direction: column; gap: 8px; }
        .form-group.full-width { grid-column: 1 / -1; }

        .form-label { font-size: 0.85rem; font-weight: 600; color: var(--text-dark); text-transform: uppercase; letter-spacing: 0.5px; }
        .form-control { padding: 12px 16px; border: 1px solid #94a3b8; border-radius: 6px; font-size: 1rem; font-family: inherit; color: var(--text-dark); transition: all 0.2s; background: #fff; }
        .form-control:focus { outline: none; border-color: var(--brand-primary); box-shadow: 0 0 0 4px rgba(36, 145, 255, 0.2); }
        .form-control:disabled { background-color: #f1f5f9; color: #64748b; cursor: not-allowed; border-color: #e2e8f0; font-weight: 500;}
        textarea.form-control { resize: vertical; min-height: 120px; line-height: 1.5; }

        .form-actions { display: flex; align-items: center; justify-content: flex-end; gap: 15px; margin-top: 30px; }
        .btn { padding: 12px 28px; border-radius: 6px; font-size: 0.95rem; font-weight: 600; cursor: pointer; transition: all 0.2s; display: inline-flex; align-items: center; justify-content: center; gap: 8px; border: none; font-family: inherit; }
        .btn:active { transform: scale(0.98); }
        .btn-secondary { background-color: white; border: 1px solid #cbd5e1; color: var(--text-dark); }
        .btn-secondary:hover { background-color: #f8fafc; border-color: #94a3b8; }
        .btn-primary { background-color: var(--brand-primary); color: white; box-shadow: 0 4px 12px rgba(0, 43, 73, 0.15); }
        .btn-primary:hover { background-color: #001f35; }
        .btn-primary:disabled { opacity: 0.7; cursor: not-allowed; }

        .status-alert { display: none; padding: 14px 20px; border-radius: 8px; font-size: 0.95rem; font-weight: 500; margin-bottom: 25px; align-items: center; gap: 10px; animation: slideDown 0.3s ease; }
        .status-alert.success { background-color: #ecfdf5; border: 1px solid #a7f3d0; color: #065f46; display: flex; }
        .status-alert.error { background-color: #fef2f2; border: 1px solid #fecaca; color: #991b1b; display: flex; }

        /* Loader Overlay */
        #pageLoader { position: fixed; top:0; left:0; width:100%; height:100%; background: white; z-index: 9999; display: flex; justify-content: center; align-items: center; flex-direction: column; gap: 15px; transition: opacity 0.4s; }
        .spinner { animation: spin 1s linear infinite; font-size: 2.5rem; color: var(--brand-primary); }

        @media (max-width: 768px) {
            .form-grid { grid-template-columns: 1fr; }
            .form-section { padding: 30px 20px; }
            .profile-page-header { flex-direction: column; text-align: center; }
            .form-actions { flex-direction: column-reverse; }
            .btn { width: 100%; }
        }
    </style>
</head>

<body>

    <!-- 占位符：全局组件加载区 -->

    <main>

                <div class="profile-title">

    <!-- UI Core Scripts (Component Loader & I18N) -->
    <script>
        window.locales = {};

        // === 统一组件加载器 (支持相对路径) ===
        // 这里假设 profile.html 位于 /profile/ 文件夹内。如果是，请使用 '../assets'。如果在根目录，请改回 './assets'。
        const basePath = '../assets'; 

        async function loadComponent(url, elementId) {
            try {
                const response = await fetch(url + '?t=' + new Date().getTime());
                if (!response.ok) return;
                const html = await response.text();
                const temp = document.createElement('div');
                temp.innerHTML = html;
                const scripts = Array.from(temp.querySelectorAll('script'));
                scripts.forEach(s => s.remove());
                const placeholder = document.getElementById(elementId);
                if (!placeholder) return;
                while (temp.firstChild) {
                    placeholder.parentNode.insertBefore(temp.firstChild, placeholder);
                }
                placeholder.remove();
                // 恢复脚本
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    if (oldScript.innerHTML) newScript.text = oldScript.innerHTML;
                    document.body.appendChild(newScript);
                });
            } catch (error) { console.error('Component load failed:', url); }
        }

        // === 全局事件代理 (处理 Auth 菜单和 Mobile Menu) ===
        document.addEventListener('click', (e) => {
            // Mobile Menu
            if (e.target.closest('#mobileMenuOpenBtn')) {
                const menu = document.getElementById('mobileNavMenu');
                if(menu) { menu.classList.add('is-active'); document.body.style.overflow = 'hidden'; }
            }
            if (e.target.closest('#mobileMenuCloseBtn')) {
                const menu = document.getElementById('mobileNavMenu');
                if(menu) { menu.classList.remove('is-active'); document.body.style.overflow = 'auto'; }
            }
            // Desktop Auth Dropdown
            const dAvatarBtn = e.target.closest('#dAvatarBtn');
            const authDrop = document.getElementById('desktopAuthDropdown');
            if (dAvatarBtn) {
                if(authDrop) authDrop.classList.toggle('show');
            } else if (!e.target.closest('.auth-dropdown-desktop')) {
                if(authDrop) authDrop.classList.remove('show');
            }
        });

        // === I18N 逻辑 ===
        window.applyTranslations = function () {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (window.locales[key]) el.innerHTML = window.locales[key];
            });
        };

        window.setLanguage = async function (lang) {
            document.documentElement.setAttribute('lang', lang);
            try {
                // 读取全局翻译 (来自 assets)
                const globalRes = await fetch(`${basePath}/${lang}.json`).catch(() => null);
                // 读取本页面特定翻译 (来自当前文件夹)
                const pageRes = await fetch(`./${lang}.json`).catch(() => null);
                
                let globalData = {}, pageData = {};
                if (globalRes && globalRes.ok) globalData = await globalRes.json();
                if (pageRes && pageRes.ok) pageData = await pageRes.json();
                
                window.locales = { ...globalData, ...pageData };
            } catch (e) {}

            window.applyTranslations();
            document.title = window.locales['tab_title_profile'] || "KSVG | Profile";
            localStorage.setItem('ksvg_ui_lang', lang);
            
            // 刷新内部 JS 渲染的文字
            if (window.refreshAuthText) window.refreshAuthText();
        };

        window.initLanguageSelection = async function (lang) {
            document.getElementById('langModal').style.display = 'none';
            await window.setLanguage(lang);
        };

        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                loadComponent(`${basePath}/us-banner.html`, 'us-banner-placeholder'),
                loadComponent(`${basePath}/navigation.html`, 'navigation-placeholder'),
                loadComponent(`${basePath}/footer.html`, 'footer-placeholder')
            ]);
            let lang = localStorage.getItem('ksvg_ui_lang') || 'zh-hans';
            await window.setLanguage(lang);
            if (window.initSupabaseProfile) await window.initSupabaseProfile();
        });
    </script>

    <!-- MODULE: SUPABASE AUTH & DATA BINDING -->
    <script type="module">
        import { createClient } from 'https://cdn.jsdelivr.net/npm/@supabase/supabase-js/+esm'
        
        const SUPABASE_URL = 'https://nggctknpitbycegyvfzk.supabase.co';
        const SUPABASE_ANON_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5nZ2N0a25waXRieWNlZ3l2ZnprIiwicm9sZSI6ImFub24iLCJpYXQiOjE3Njg5NDM5MzksImV4cCI6MjA4NDUxOTkzOX0.zQRfrbC5qSjrnSN9Z_ITjL_OVUbCsWFz5zUro0dP1fU';
        
        const getCookieDomain = () => {
            const hostname = window.location.hostname;
            return hostname.includes('ksvg.com.cn') ? '.ksvg.com.cn' : hostname;
        };

        // Advanced Chunking Cookie Storage for Session Sync
        const cookieStorage = {
            setItem: (key, value) => {
                const domain = getCookieDomain();
                const encodedValue = encodeURIComponent(value);
                const chunkSize = 3000;
                const chunks = Math.ceil(encodedValue.length / chunkSize);
                document.cookie = `${key}-count=${chunks}; domain=${domain}; path=/; max-age=31536000; secure; samesite=lax`;
                for (let i = 0; i < chunks; i++) {
                    const chunk = encodedValue.slice(i * chunkSize, (i + 1) * chunkSize);
                    document.cookie = `${key}-${i}=${chunk}; domain=${domain}; path=/; max-age=31536000; secure; samesite=lax`;
                }
            },
            getItem: (key) => {
                const countMatch = document.cookie.match(new RegExp('(^| )' + key + '-count=([^;]+)'));
                if (!countMatch) return null;
                const count = parseInt(countMatch[2], 10);
                let fullValue = '';
                for (let i = 0; i < count; i++) {
                    const chunkMatch = document.cookie.match(new RegExp('(^| )' + key + '-' + i + '=([^;]+)'));
                    if (chunkMatch) fullValue += chunkMatch[2];
                }
                return fullValue ? decodeURIComponent(fullValue) : null;
            },
            removeItem: (key) => {
                const domain = getCookieDomain();
                const countMatch = document.cookie.match(new RegExp('(^| )' + key + '-count=([^;]+)'));
                if (countMatch) {
                    const count = parseInt(countMatch[2], 10);
                    for (let i = 0; i < count; i++) {
                        document.cookie = `${key}-${i}=; domain=${domain}; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT`;
                    }
                }
                document.cookie = `${key}-count=; domain=${domain}; path=/; expires=Thu, 01 Jan 1970 00:00:00 GMT`;
            }
        };

        const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY, {
            auth: { storage: cookieStorage, storageKey: 'ksvg-auth-token' }
        });

        const alertBox = document.getElementById('statusAlert');
        const saveBtn = document.getElementById('saveBtn');
        const mainAvatar = document.getElementById('mainAvatar');
        
        // Form Fields
        const formFields = {
            email: document.getElementById('email'),
            full_name: document.getElementById('displayName'),
            student_id: document.getElementById('studentId'),
            phone: document.getElementById('phone'),
            department: document.getElementById('department'),
            position: document.getElementById('position'),
            portfolio_url: document.getElementById('portfolio'),
            bio: document.getElementById('bio')
        };

        function showAlert(msgKey, type = 'success') {
            alertBox.className = `status-alert ${type}`;
            const icon = type === 'success' ? 'ri-checkbox-circle-fill' : 'ri-error-warning-fill';
            const text = window.locales[msgKey] || msgKey;
            alertBox.innerHTML = `<i class="${icon}"></i> <span>${text}</span>`;
            alertBox.style.display = 'flex';
            setTimeout(() => { alertBox.style.display = 'none'; }, 4000);
        }

        window.initSupabaseProfile = async function() {
            const { data: { session } } = await supabase.auth.getSession();

            if (!session) {
                const target = encodeURIComponent(window.location.hostname + window.location.pathname);
                window.location.href = `https://auth.ksvg.com.cn/?target=${target}`;
                return;
            }

            const email = session.user.email;
            const meta = session.user.user_metadata || {};
            const displayName = meta.full_name || email.split('@')[0];

            // Render Auth Dropdowns
            window.refreshAuthText = () => {
                const dAuth = document.getElementById('desktopAuthContainer');
                const mAuth = document.getElementById('mobileAuthDock');
                if(dAuth) {
                    dAuth.innerHTML = `
                        <button class="user-avatar-btn" id="dAvatarBtn" tabindex="0">
                            <i class="ri-user-smile-line"></i> ${displayName} <i class="ri-arrow-down-s-line" style="font-size:1.1rem; margin-left: -2px;"></i>
                        </button>
                        <div class="auth-dropdown-desktop" id="desktopAuthDropdown">
                            <div class="auth-dropdown-email">${email}</div>
                            <div class="auth-dropdown-item logout" id="dLogoutBtn" tabindex="0">
                                <i class="ri-logout-box-r-line" style="font-size:1.1rem;"></i> <span data-i18n="auth_sign_out">${window.locales['auth_sign_out'] || 'Sign Out'}</span>
                            </div>
                        </div>
                    `;
                }
                if(mAuth) {
                    mAuth.innerHTML = `
                        <div class="m-acc-email">
                            <span data-i18n="auth_logged_in_as">${window.locales['auth_logged_in_as'] || 'Logged in as:'}</span><br><strong>${email}</strong>
                        </div>
                        <button class="m-acc-btn logout" id="mLogoutBtn" tabindex="0">
                            <i class="ri-logout-box-r-line" style="font-size:1.1rem;"></i> <span data-i18n="auth_sign_out">${window.locales['auth_sign_out'] || 'Sign Out'}</span>
                        </button>
                    `;
                }
                
                const doLogout = async () => {
                    await supabase.auth.signOut();
                    window.location.href = '/';
                };
                
                const dbg = document.getElementById('dLogoutBtn');
                const mbg = document.getElementById('mLogoutBtn');
                if(dbg) dbg.addEventListener('click', doLogout);
                if(mbg) mbg.addEventListener('click', doLogout);
            };

            if(Object.keys(window.locales).length > 0) window.refreshAuthText();

            // Populate Form fields
            mainAvatar.textContent = displayName.charAt(0).toUpperCase();
            formFields.email.value = email;
            Object.keys(formFields).forEach(key => {
                if (key !== 'email' && meta[key]) formFields[key].value = meta[key];
            });

            // Remove Loader Shield
            document.getElementById('pageLoader').style.opacity = '0';
            setTimeout(() => document.getElementById('pageLoader').style.display = 'none', 400);
        }

        // Handle Save
        document.getElementById('profileForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const originalBtnHtml = saveBtn.innerHTML;
            saveBtn.innerHTML = `<i class="ri-loader-4-line spinner" style="font-size:1.1rem; color:white;"></i>`;
            saveBtn.disabled = true;
            alertBox.style.display = 'none';

            try {
                const payload = {};
                Object.keys(formFields).forEach(key => {
                    if (key !== 'email') payload[key] = formFields[key].value.trim();
                });

                const { error } = await supabase.auth.updateUser({ data: payload });
                if (error) throw error;

                // Update Avatar Live
                const newName = payload.full_name || email.split('@')[0];
                mainAvatar.textContent = newName.charAt(0).toUpperCase();
                const dBtn = document.getElementById('dAvatarBtn');
                if(dBtn) dBtn.innerHTML = `<i class="ri-user-smile-line"></i> ${newName} <i class="ri-arrow-down-s-line" style="font-size:1.1rem; margin-left: -2px;"></i>`;

                showAlert("alert_success", "success");

            } catch (err) {
                console.error(err);
                showAlert("alert_error", "error");
            } finally {
                saveBtn.innerHTML = originalBtnHtml;
                saveBtn.disabled = false;
            }
        });
    </script>
</body>
</html>
