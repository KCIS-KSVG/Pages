<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KSVG | 404 Not Found</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&family=Poppins:wght@700&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="icon" href="./assets/ksvg-logo.png?v=3" type="image/png">

    <style>
        /* --- CORE VARIABLES --- */
        :root {
            --brand-primary: #002b49;
            --brand-secondary: #c41230;
            --bg-color: #ffffff;
            --text-dark: #0f172a;
            --text-muted: #475569;
            --header-height: 64px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg-color); color: var(--text-dark); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; overflow-x: hidden; }
        a { text-decoration: none; color: inherit; }
        main { flex-grow: 1; display: flex; flex-direction: column; }

        /* A11Y Outline */
        a:focus-visible, button:focus-visible { outline: 0.25rem solid #2491ff !important; outline-offset: 0.125rem !important; border-radius: 4px; }

        .brand-strip { height: 4px; width: 100%; background: linear-gradient(90deg, var(--brand-primary) 60%, var(--brand-secondary) 100%); }

        /* --- 404 PAGE CONTENT --- */
        .error-container {
            flex-grow: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 80px 20px;
        }
        
        .error-container h1 { font-family: 'Poppins', sans-serif; font-size: 8rem; color: var(--brand-primary); line-height: 1; margin-bottom: 10px; text-shadow: 0 10px 30px rgba(0,43,73,0.1); }
        .error-container h2 { font-size: 1.8rem; margin-bottom: 15px; color: var(--text-dark); line-height: 1.3;}
        .error-container p { font-size: 1rem; color: var(--text-muted); max-width: 500px; margin-bottom: 30px; line-height: 1.6; }
        
        .btn-primary { 
            padding: 12px 32px; background-color: var(--brand-primary); color: white; 
            border-radius: 8px; font-weight: 600; transition: all 0.2s; display: inline-flex; align-items: center; gap: 8px;
        }
        .btn-primary:hover { background-color: #001f35; transform: translateY(-2px); box-shadow: 0 4px 12px rgba(0,43,73,0.15); }
    </style>
</head>

<body>
    <!-- 占位符：组件加载区 -->
    <div id="us-banner-placeholder"></div>
    <div class="brand-strip"></div>
    <div id="navigation-placeholder"></div>

    <main>
        <div class="error-container">
            <h1>404</h1>
            <!-- 静态中英双语结构 (不加 data-i18n) -->
            <h2>
                页面未找到 <br>
                <span style="font-size: 0.7em; font-weight: 500; color: var(--text-muted);">Page Not Found</span>
            </h2>
            <p>
                您访问的页面可能已被移动、删除或从未存在。<br>
                <span style="font-size: 0.85em;">The page you are looking for might have been removed, had its name changed, or is temporarily unavailable.</span>
            </p>
            <a href="/" class="btn-primary">返回首页 Return to Homepage</a>
        </div>
    </main>

    <div id="footer-placeholder"></div>

    <!-- 语言切换 Modal 模态框 (给 Footer 调用) -->
    <div class="modal-overlay" id="langModal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.6); backdrop-filter: blur(8px); z-index: 10000; align-items: center; justify-content: center;">
        <div class="lang-modal-box" style="background: #fff; padding: 40px 30px; border-radius: 16px; width: 90%; max-width: 360px; text-align: center; box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);">
            <i class="ri-global-line" style="font-size: 2.5rem; color: var(--brand-primary); margin-bottom: 15px;"></i>
            <h3 style="margin-bottom: 5px; font-family: 'Georgia', serif; font-size: 1.5rem;">Select Language</h3>
            <p style="color: #475569; font-size: 0.85rem; margin-bottom: 25px;">Please select your preferred language to continue.</p>
            <button style="width: 100%; padding: 14px; margin-bottom: 12px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer;" onclick="initLanguageSelection('en-us')">English</button>
            <button style="width: 100%; padding: 14px; margin-bottom: 12px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer;" onclick="initLanguageSelection('zh-hans')">简体中文</button>
            <button style="width: 100%; padding: 14px; background: #fff; border: 1px solid #e2e8f0; border-radius: 8px; font-size: 0.95rem; font-weight: 600; cursor: pointer;" onclick="initLanguageSelection('zh-hant')">繁體中文</button>
        </div>
    </div>

    <!-- UI CORE SCRIPTS -->
    <script>
        window.locales = {};
        // 🔧 根据你的实际目录结构调整此路径！
        // 如果 assets 文件夹与当前 404.html 同级（都在 Pages 下），请保持 './assets'
        // 如果 assets 在上一级（项目根目录），请改为 '../assets'
        const basePath = './assets';

        async function loadComponent(url, elementId) {
            try {
                const response = await fetch(url + '?t=' + new Date().getTime());
                if (!response.ok) {
                    console.warn(`组件加载失败: ${url} (状态码 ${response.status})`);
                    return;
                }
                const html = await response.text();
                
                const temp = document.createElement('div');
                temp.innerHTML = html;
                
                const scripts = Array.from(temp.querySelectorAll('script'));
                scripts.forEach(s => s.remove());
                
                const placeholder = document.getElementById(elementId);
                if (!placeholder) return;
                while (temp.firstChild) {
                    placeholder.parentNode.insertBefore(temp.firstChild, placeholder);
                }
                placeholder.remove();
                
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    if (oldScript.innerHTML) {
                        newScript.text = oldScript.innerHTML;
                    }
                    document.body.appendChild(newScript);
                });
            } catch (error) {
                console.error('加载组件失败:', url, error);
            }
        }

        window.applyTranslations = function () {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (window.locales[key]) {
                    el.innerHTML = window.locales[key];
                } else if (!window.locales[key]) {
                    // 若缺失翻译键，保留原始 HTML 并仅在控制台提示一次
                    console.debug(`缺少翻译键: "${key}"`);
                }
            });
        }

        window.setLanguage = async function (lang) {
            document.documentElement.setAttribute('lang', lang);
            localStorage.setItem('ksvg_ui_lang', lang);
            
            try {
                // 仅拉取全局语言资产用于渲染 Nav 和 Footer
                const globalRes = await fetch(`${basePath}/${lang}.json`).catch(() => null);
                if (globalRes && globalRes.ok) {
                    window.locales = await globalRes.json();
                    console.log(`语言文件加载成功: ${lang}.json`);
                } else {
                    console.error(`语言文件加载失败: ${lang}.json（请检查文件是否存在及路径）`);
                    // 失败时给予空对象，避免后续错误
                    window.locales = {};
                }
            } catch (e) {
                console.error('语言加载异常:', e);
                window.locales = {};
            }

            window.applyTranslations();
            
            const lbls = { 'en-us': 'English', 'zh-hans': '简体中文', 'zh-hant': '繁體中文' };
            document.querySelectorAll('.current-lang-text').forEach(s => {
                s.textContent = lbls[lang] || lbls['zh-hans'];
            });
            
            // 刷新账户界面时也需要重新翻译（防止动态内容丢失翻译）
            if (window.refreshAuthText) {
                await window.refreshAuthText();
                window.applyTranslations(); // 二次翻译确保动态 Auth 区域被正确替换
            }
        }

        window.initLanguageSelection = async function (lang) {
            document.getElementById('langModal').style.display = 'none';
            await window.setLanguage(lang);
        }

        document.addEventListener('DOMContentLoaded', async () => {
            // 同步加载全局组件（先加载，再翻译）
            await Promise.all([
                loadComponent(`${basePath}/us-banner.html`, 'us-banner-placeholder'),
                loadComponent(`${basePath}/navigation.html`, 'navigation-placeholder'),
                loadComponent(`${basePath}/footer.html`, 'footer-placeholder')
            ]);
            
            // 初始化语言（会自动应用翻译到已加载的组件）
            let lang = localStorage.getItem('ksvg_ui_lang') || 'zh-hans';
            await window.setLanguage(lang);
            
            // 初始化账户状态（内部会调用 renderNavigationAuth，之后再补一次翻译）
            if (window.initAuthUI) {
                await window.initAuthUI();
                window.applyTranslations(); // 确保移动端菜单等动态内容也被翻译
            }
        });
        
        // 全局事件代理：仅保留关闭语言菜单的逻辑（具体切换逻辑在 footer.html 内部已处理）
        document.addEventListener('click', (e) => {
            const langMenu = document.getElementById('footerLangMenu');
            const langBtn = document.getElementById('footerLangToggleBtn');
            // 点击外部关闭菜单
            if (langMenu && !e.target.closest('.footer-lang-menu') && !e.target.closest('#footerLangToggleBtn')) {
                langMenu.classList.remove('show');
            }
        });
    </script>

        const cookieStorage = {
            getItem: (key) => {

            if (Object.keys(window.locales).length > 0) {

        }
    </script>
</body>
</html>
