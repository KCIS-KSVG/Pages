<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="KSVG Partners, 昆山康桥学生摄影合作组织合作单位">
    <title>KSVG | Partners</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Open+Sans:wght@700;800&family=Georgia&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="icon" href="../assets/ksvg-logo.png?v=3" type="image/png">
    <link rel="shortcut icon" href="../assets/ksvg-logo.png?v=3" type="image/png">

    <style>
        :root {
            --brand-primary: #002b49;
            --brand-secondary: #c41230;
            --bg-color: #f8fafc;
            --surface-color: #ffffff;
            --border-color: #e2e8f0;
            --text-dark: #0f172a;
            --text-muted: #475569;
            --header-height: 64px;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg-color); color: var(--text-dark); line-height: 1.6; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }
        a { text-decoration: none; color: inherit; }
        main { flex-grow: 1; }

        a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, [tabindex]:focus-visible { outline: 0.25rem solid #2491ff !important; outline-offset: 0.125rem !important; border-radius: 4px; }
        .brand-strip { height: 4px; width: 100%; background: linear-gradient(90deg, var(--brand-primary) 60%, var(--brand-secondary) 100%); }

        /* ========== 页面头部 ========== */
        .page-header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px 0;
        }

        .page-header h1 {
            font-family: 'Open Sans', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }

        .page-header .page-subtitle {
            font-size: 1.05rem;
            color: #64748b;
            font-weight: 400;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .page-header .header-divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, #e2e8f0 0%, #cbd5e1 50%, transparent 100%);
            margin-bottom: 50px;
        }

        /* ========== 合作单位网格 ========== */
        .partners-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 100px;
        }

        .partners-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(340px, 1fr));
            gap: 30px;
        }

        .partner-card {
            background: var(--surface-color);
            border: 1px solid var(--border-color);
            border-radius: 12px;
            padding: 40px 35px;
            display: flex;
            flex-direction: column;
            align-items: flex-start;
            gap: 20px;
            transition: transform 0.2s, box-shadow 0.2s;
            text-decoration: none;
            position: relative;
        }

        .partner-card.has-link {
            cursor: pointer;
        }

        .partner-card.has-link:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px rgba(0, 0, 0, 0.06);
        }

        .partner-icon {
            width: 56px;
            height: 56px;
            border-radius: 12px;
            background: #ffffff;
            border: 1px solid var(--border-color);
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
            flex-shrink: 0;
        }

        .partner-icon img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            padding: 8px;
        }

        /* 为没有图片的卡片保留原来的图标样式 */
        .partner-icon i {
            font-size: 1.6rem;
            color: var(--brand-primary);
        }

        .partner-info {
            flex: 1;
        }

        .partner-info h3 {
            font-family: 'Georgia', serif;
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 6px;
            line-height: 1.3;
        }

        .partner-info .partner-desc {
            font-size: 0.85rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 12px;
        }

        .partner-link-row {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--brand-primary);
            transition: gap 0.2s;
        }

        .partner-card.has-link:hover .partner-link-row {
            gap: 10px;
        }

        .partner-link-row i {
            font-size: 0.75rem;
            opacity: 0.7;
        }

        @media (max-width: 768px) {
            .page-header { padding: 40px 20px 0; }
            .page-header h1 { font-size: 2.2rem; }
            .page-header .page-subtitle { font-size: 0.9rem; }
            .partners-section { padding: 0 20px 80px; }
            .partners-grid { grid-template-columns: 1fr; }
            .partner-card { padding: 30px 25px; }
        }
    </style>
</head>

<body>

    <div id="us-banner-placeholder"></div>
    <div class="brand-strip"></div>
    <div id="navigation-placeholder"></div>

    <main>
        <div class="page-header">
            <h1 data-i18n="partners_page_title">合作单位</h1>
            <p class="page-subtitle" data-i18n="partners_page_subtitle">感谢以下校内外组织与 KSVG 建立协作关系，共同推动校园视觉媒体发展</p>
            <div class="header-divider"></div>
        </div>

        <section class="partners-section">
            <div class="partners-grid">
                <!-- 康桥银行 -->
                <a href="https://bankofkangchiao.com" target="_blank" rel="noopener noreferrer" class="partner-card has-link" tabindex="0">
                    <div class="partner-icon">
                        <img src="../assets/bkc-logo.png" alt="Bank of Kang Chiao Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <i class="ri-bank-line" style="display: none;"></i>
                    </div>
                    <div class="partner-info">
                        <h3 data-i18n="partner_bkc_name">康桥银行</h3>
                        <p class="partner-desc" data-i18n="partner_bkc_desc">康桥学生自主运营的校园金融机构，提供创新金融教育与服务体验</p>
                        <div class="partner-link-row">
                            <span data-i18n="partner_visit_website">访问网站</span>
                            <i class="ri-arrow-right-up-line" aria-hidden="true"></i>
                        </div>
                    </div>
                </a>

                <!-- 学生会公关组 -->
                <a href="https://kcsc.ksvg.com.cn" target="_blank" rel="noopener noreferrer" class="partner-card has-link" tabindex="0">
                    <div class="partner-icon">
                        <img src="../assets/kcsc-logo.png" alt="KCSC Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <i class="ri-group-line" style="display: none;"></i>
                    </div>
                    <div class="partner-info">
                        <h3 data-i18n="partner_kcsc_name">昆山康桥学生会公关组</h3>
                        <p class="partner-desc" data-i18n="partner_kcsc_desc">负责学生会对外联络与形象宣传的核心部门</p>
                        <div class="partner-link-row">
                            <span data-i18n="partner_visit_website">访问网站</span>
                            <i class="ri-arrow-right-up-line" aria-hidden="true"></i>
                        </div>
                    </div>
                </a>

                <!-- 康桥排球联赛 KCVA（链接暂时为 #） -->
                <a href="https://kcva.ksvg.com.cn" class="partner-card has-link" tabindex="0">
                    <div class="partner-icon">
                        <img src="../assets/kcva-logo.png" alt="KCVA Logo" onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';">
                        <i class="ri-volleyball-line" style="display: none;"></i>
                    </div>
                    <div class="partner-info">
                        <h3 data-i18n="partner_kcva_name">康桥排球联赛</h3>
                        <p class="partner-desc" data-i18n="partner_kcva_desc">KCVA — 康桥排球联赛，推动校园排球运动发展，组织校内联赛与校际交流</p>
                        <div class="partner-link-row">
                            <span data-i18n="partner_visit_website">访问网站</span>
                            <i class="ri-arrow-right-up-line" aria-hidden="true"></i>
                        </div>
                    </div>
                </a>
            </div>
        </section>
    </main>

    <div id="footer-placeholder"></div>

    <script>
        window.locales = {};
        const componentBasePath = '../assets';

        async function loadComponent(filename, elementId) {
            const url = `${componentBasePath}/${filename}?t=${new Date().getTime()}`;
            try {
                const response = await fetch(url);
                if (!response.ok) { console.error(`❌ 组件加载失败: ${url}`); return; }
                let html = await response.text();
                html = html.replace(/\.\/assets/g, '../assets');
                const temp = document.createElement('div');
                temp.innerHTML = html;
                const scripts = Array.from(temp.querySelectorAll('script'));
                scripts.forEach(s => s.remove());
                const placeholder = document.getElementById(elementId);
                if (!placeholder) return;
                while (temp.firstChild) { placeholder.parentNode.insertBefore(temp.firstChild, placeholder); }
                placeholder.remove();
                scripts.forEach(oldScript => {
                    const newScript = document.createElement('script');
                    Array.from(oldScript.attributes).forEach(attr => newScript.setAttribute(attr.name, attr.value));
                    if (oldScript.innerHTML) newScript.text = oldScript.innerHTML;
                    document.body.appendChild(newScript);
                });
                console.log(`✅ 组件加载成功: ${filename}`);
            } catch (error) { console.error(`❌ 组件加载异常: ${filename}`, error); }
        }

        window.applyTranslations = function () {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (window.locales[key]) el.innerHTML = window.locales[key];
            });
        };

        window.setLanguage = async function (lang) {
            document.documentElement.setAttribute('lang', lang);
            localStorage.setItem('ksvg_ui_lang', lang);

            try {
                const globalRes = await fetch(`../assets/${lang}.json?t=${new Date().getTime()}`).catch(() => null);
                const pageRes = await fetch(`./${lang}.json?t=${new Date().getTime()}`).catch(() => null);
                let globalData = {}, pageData = {};
                if (globalRes && globalRes.ok) globalData = await globalRes.json();
                if (pageRes && pageRes.ok) pageData = await pageRes.json();
                window.locales = { ...globalData, ...pageData };
            } catch (e) { console.error('语言文件加载异常:', e); }

            window.applyTranslations();
            document.title = window.locales['tab_title_partners'] || "KSVG | 合作单位";

            const lbls = { 'en-us': 'English', 'zh-hans': '简体中文', 'zh-hant': '繁體中文' };
            document.querySelectorAll('.current-lang-text').forEach(s => s.textContent = lbls[lang] || lbls['zh-hans']);

            if (window.updateFooterLangDisplay) window.updateFooterLangDisplay(lang);
        };

        window.initLanguageSelection = async function (lang) {
            const modal = document.getElementById('langModal');
            if (modal) modal.classList.remove('show');
            await window.setLanguage(lang);
        };

        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                loadComponent('us-banner.html', 'us-banner-placeholder'),
                loadComponent('navigation.html', 'navigation-placeholder'),
                loadComponent('footer.html', 'footer-placeholder')
            ]);

            let lang = localStorage.getItem('ksvg_ui_lang') || 'zh-hans';
            await window.setLanguage(lang);
        });
    </script>
</body>

</html>
