        gap: 15px;

    .footer-logo {
        display: flex;
        align-items: center;
        gap: 10px;
        font-family: 'Open Sans', sans-serif;
        font-size: 1.2rem;
        font-weight: 800;
        color: #fff;
    }

    .footer-logo img {
        width: 32px;
        filter: grayscale(100%) brightness(200%);
        opacity: 0.9;
    }

    .footer-socials {
        display: flex;
        gap: 12px;
        align-items: center;
    }

    .social-circle {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: #1e293b;
        color: #fff;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.1rem;
        transition: all 0.2s;
        text-decoration: none;
        border: none;
        cursor: pointer;
        padding: 0;
    }

    .social-circle:hover,
    .social-circle:focus-visible {
        background: var(--link-blue, #005ea2);
        transform: translateY(-2px);
    }

    .footer-legal {
        text-align: right;
    }

    .footer-legal-links {
        margin-bottom: 8px;
        font-size: 0.7rem;
    }

    .footer-legal-links a {
        color: #94a3b8;
        text-decoration: none;
        margin-left: 15px;
        transition: color 0.2s;
    }

    .footer-legal-links a:hover {
        color: #fff;
        text-decoration: underline;
    }

    .footer-a11y-text {
        margin-top: 8px;
        font-size: 0.65rem;
        color: #64748b;
        max-width: 500px;
        line-height: 1.5;
        margin-left: auto;
    }

    .footer-a11y-text a {
        color: #94a3b8;
        text-decoration: underline;
    }

    .footer-a11y-text a:hover {
        color: #fff;
    }

    @media (max-width: 900px) {
        .footer-grid {
            grid-template-columns: 1fr;
            gap: 40px;
        }

        .footer-bottom {
            flex-direction: column;
            align-items: flex-start;
            gap: 30px;
        }

        .footer-legal {
            text-align: left;
        }

        .footer-legal-links a {
            margin-left: 0;
            margin-right: 15px;
        }

        .footer-a11y-text {
            margin-left: 0;
        }
    }
</style>

<script>
    (function () {
        if (window.footerBound) return;
        window.footerBound = true;

        function updateLangButtonText(lang) {
            const lbls = { 'en-us': 'English', 'zh-hans': '简体中文', 'zh-hant': '繁體中文' };
            const displayText = lbls[lang] || lbls['zh-hans'];
            const btn = document.getElementById('footerLangToggleBtn');
            if (btn) {
                const span = btn.querySelector('.current-lang-text');
                if (span) span.textContent = displayText;
            }
        }

        async function switchLanguage(lang) {
            if (window.initLanguageSelection) {
                await window.initLanguageSelection(lang);
            }
            updateLangButtonText(lang);
        }

        function syncInitialLang() {
            const currentLang = document.documentElement.getAttribute('lang') || localStorage.getItem('ksvg_ui_lang') || 'zh-hans';
            updateLangButtonText(currentLang);
        }

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', syncInitialLang);
        } else {
            syncInitialLang();
        }

        document.addEventListener('click', function (e) {
            const langBtn = e.target.closest('#footerLangToggleBtn');
            const langMenu = document.getElementById('footerLangMenu');
            if (langBtn) {
                if (langMenu) langMenu.classList.toggle('show');
            } else if (!e.target.closest('.footer-lang-menu')) {
                if (langMenu) langMenu.classList.remove('show');
            }

            const langOption = e.target.closest('.footer-lang-option');
            if (langOption) {
                const lang = langOption.getAttribute('onclick')?.match(/'([^']+)'/)?.[1];
                if (lang) {
                    e.preventDefault();
                    switchLanguage(lang);
                }
                if (langMenu) langMenu.classList.remove('show');
            }

            if (e.target.closest('#footerWechatBtn')) {
                navigator.clipboard.writeText("KSVG").then(() => {
                    const lang = document.documentElement.getAttribute('lang') || 'zh-hans';
                    const msg = {
                        'en-us': 'WeChat ID "KSVG" copied to clipboard!\nPlease search for KSVG on WeChat.',
                        'zh-hans': '微信公众号 "KSVG" 已复制到剪贴板！\n请前往微信搜索 KSVG。',
                        'zh-hant': '微信公眾號 "KSVG" 已複製到剪貼板！\n請前往微信搜索 KSVG。'
                    }[lang];
                    alert(msg);
                });
            }
        });

        window.updateFooterLangDisplay = updateLangButtonText;
    })();
</script>
