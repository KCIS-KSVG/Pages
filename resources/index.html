<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="KSVG Resources, 昆山康桥学生摄影合作组织素材库">
    <title>KSVG | 素材库</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@700;800&family=Georgia&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="icon" href="../assets/ksvg-logo.png?v=3" type="image/png">
    <link rel="shortcut icon" href="../assets/ksvg-logo.png?v=3" type="image/png">

    <style>
        :root {
            --brand-primary: #002b49;
            --brand-secondary: #c41230;
            --bg-color: #f4f6fa;
            --surface-color: #ffffff;
            --border-color: #e2e8f0;
            --text-dark: #0f172a;
            --text-muted: #475569;
            --text-light: #64748b;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            --focus-ring: 0 0 0 3px rgba(0, 43, 73, 0.25);
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg-color); color: var(--text-dark); line-height: 1.5; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }
        a { text-decoration: none; color: inherit; }
        main { flex-grow: 1; }

        :focus-visible { outline: 0.2rem solid var(--brand-primary); outline-offset: 0.2rem; border-radius: 4px; }
.brand-strip { height: 4px; width: 100%; background: linear-gradient(90deg, var(--brand-primary) 60%, var(--brand-secondary) 100%); }

        /* 页面头部 */
        .page-header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px 0;
        }
.page-header h1 {
    font-family: 'Open Sans', sans-serif;
    font-size: 3rem;
    font-weight: 800;
    color: #0f172a;
    margin-bottom: 12px;
    letter-spacing: 1px;  /* 与 recruiting 保持一致 */
}
        .page-header .page-subtitle {
            font-size: 0.95rem;
            color: #64748b;
            font-weight: 400;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .page-header .header-divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, #e2e8f0 0%, #cbd5e1 50%, transparent 100%);
            margin-bottom: 40px;
        }

        /* 工具栏 */
        .toolbar {
            max-width: 1200px;
            margin: 0 auto 20px;
            padding: 0 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
        }
        .search-wrapper { flex: 1; min-width: 240px; position: relative; }
        .search-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 1rem; pointer-events: none; }
        .search-input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: inherit;
            background: var(--surface-color);
            transition: all 0.2s;
        }
        .search-input:focus { outline: none; border-color: var(--brand-primary); box-shadow: var(--focus-ring); }
        .search-clear {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 1rem;
            padding: 4px; display: none; border-radius: 50%;
        }
        .search-clear:hover { color: var(--text-dark); background: #f1f5f9; }
        .search-clear.visible { display: flex; align-items: center; justify-content: center; }

        .toolbar-actions { display: flex; gap: 8px; align-items: center; }
        .icon-btn {
            width: 38px; height: 38px; border-radius: 8px; border: 1px solid var(--border-color);
            background: var(--surface-color); color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
            transition: all 0.2s;
        }
        .icon-btn:hover { background: #e2e8f0; color: var(--brand-primary); border-color: var(--brand-primary); }

        /* 筛选面板 */
        .filter-panel {
            position: absolute; top: calc(100% + 8px); right: 20px; width: 280px;
            background: var(--surface-color); border: 1px solid var(--border-color);
            border-radius: 12px; box-shadow: var(--shadow-lg); z-index: 100;
            display: none; padding: 20px; flex-direction: column; gap: 16px;
        }
        .filter-panel.open { display: flex; }
        .filter-group-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 8px; }
        .filter-chips { display: flex; flex-wrap: wrap; gap: 6px; }
        .filter-chip {
            padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border-color);
            background: var(--surface-color); font-size: 0.75rem; font-weight: 500;
            cursor: pointer; transition: all 0.2s; color: var(--text-muted);
        }
        .filter-chip:hover { border-color: var(--brand-primary); background: #f0f4f8; }
        .filter-chip.selected { background: var(--brand-primary); color: white; border-color: var(--brand-primary); }
        .panel-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
        .panel-btn {
            padding: 6px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
            cursor: pointer; border: none; background: #f1f5f9; color: var(--text-dark);
        }
        .panel-btn.primary { background: var(--brand-primary); color: white; }
        .panel-btn:hover { opacity: 0.85; }

        .results-count {
            max-width: 1200px; margin: 0 auto 16px; padding: 0 20px;
            font-size: 0.8rem; color: var(--text-muted);
        }

        /* 资源网格 */
        .resources-section {
            max-width: 1200px; margin: 0 auto; padding: 0 20px 80px;
        }
        #resources-cards-container {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
            gap: 20px;
        }

        .resource-card {
            background: var(--surface-color);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .resource-card:hover {
            transform: translateY(-2px);
            box-shadow: var(--shadow-md);
            border-color: var(--brand-primary);
        }

        .card-header {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 12px;
        }
        .card-icon {
            width: 40px;
            height: 40px;
            border-radius: 8px;
            background: var(--brand-primary);
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .card-icon i { font-size: 1.2rem; color: white; }
        .card-title {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
            line-height: 1.4;
            flex: 1;
        }
        .card-desc {
            font-size: 0.8rem;
            color: var(--text-muted);
            line-height: 1.5;
            margin-bottom: 14px;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .card-meta {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 12px;
            border-top: 1px solid var(--border-color);
        }
        .meta-status {
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
        }
        .meta-status.active { background: #e6f7e6; color: #2e7d32; }
        .meta-status.expired { background: #fee; color: #c62828; }
        .meta-date {
            font-size: 0.7rem;
            color: var(--text-light);
            display: flex;
            align-items: center;
            gap: 4px;
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-top: 40px;
        }
        .page-btn {
            background: white;
            border: 1px solid var(--border-color);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .page-btn:hover:not(:disabled) {
            background: var(--brand-primary);
            color: white;
            border-color: var(--brand-primary);
        }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .page-info {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: #f1f5f9;
            padding: 6px 16px;
            border-radius: 30px;
        }

        .empty-state {
            grid-column: 1 / -1;
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state i { font-size: 2.5rem; color: #cbd5e1; margin-bottom: 16px; display: block; }
        .retry-btn {
            background: var(--brand-primary);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }

        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(244, 246, 250, 0.9); backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center; z-index: 10;
            border-radius: 12px;
        }
        .loader {
            border: 3px solid #e2e8f0;
            border-top: 3px solid var(--brand-primary);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* 模态框 */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5); backdrop-filter: blur(4px);
            z-index: 2000; opacity: 0; pointer-events: none; transition: opacity 0.2s;
            display: flex; justify-content: center; align-items: center;
        }
        .modal-overlay.visible { opacity: 1; pointer-events: auto; }
        .modal-content {
            background: #fff;
            border-radius: 16px;
            width: 90%;
            max-width: 480px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            transform: scale(0.96);
            opacity: 0;
            transition: transform 0.2s, opacity 0.2s;
            overflow: hidden;
        }
        .modal-overlay.visible .modal-content { transform: scale(1); opacity: 1; }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 20px 24px 12px;
            border-bottom: 1px solid #f0f0f0;
        }
        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0;
        }
        .modal-close {
            background: none; border: none; width: 32px; height: 32px;
            border-radius: 8px; cursor: pointer; font-size: 1.2rem;
            display: flex; align-items: center; justify-content: center;
        }
        .modal-close:hover { background: #f1f5f9; }
        .modal-body { padding: 20px 24px; }
        .info-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
        }
        .info-row i {
            font-size: 1.1rem;
            color: var(--brand-primary);
            width: 24px;
            margin-top: 2px;
        }
        .info-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 0.9rem;
            color: var(--text-dark);
            word-break: break-word;
        }
        .info-value.code {
            font-family: monospace;
            background: #f1f5f9;
            padding: 6px 10px;
            border-radius: 6px;
            font-size: 0.85rem;
        }
        .modal-footer {
            padding: 16px 24px 24px;
            display: flex;
            justify-content: center;
        }
        .download-btn {
            padding: 12px 28px;
            border-radius: 30px;
            border: none;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            background: var(--brand-primary);
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .download-btn:hover:not(:disabled) { background: #001f35; transform: translateY(-1px); }
        .download-btn:disabled { background: #cbd5e1; color: #64748b; cursor: not-allowed; }

        @media (max-width: 768px) {
            .page-header { padding: 40px 20px 0; }
            .page-header h1 { font-size: 2.2rem; }
            .filter-panel { width: calc(100vw - 40px); right: 0; left: auto; }
            #resources-cards-container { grid-template-columns: 1fr; gap: 12px; }
            .resource-card { padding: 16px; }
            .modal-header { padding: 16px 20px; }
            .modal-body { padding: 16px 20px; }
        }
    </style>
</head>

<body>
    <div id="us-banner-placeholder"></div>
    <div class="brand-strip"></div>
    <div id="navigation-placeholder"></div>

    <main>
        <div class="page-header">
            <h1 data-i18n="resources_page_title">素材库</h1>
            <p class="page-subtitle" data-i18n="resources_page_subtitle">浏览并下载高质量校园影像素材与标准化资源</p>
            <div class="header-divider"></div>
        </div>

        <div class="toolbar">
            <div class="search-wrapper">
                <i class="ri-search-line"></i>
                <input type="text" class="search-input" id="searchInput" placeholder="搜索素材包，按回车搜索..." autocomplete="off">
                <button class="search-clear" id="searchClear"><i class="ri-close-line"></i></button>
            </div>
            <div class="toolbar-actions">
                <button class="icon-btn" id="filterToggleBtn"><i class="ri-equalizer-line"></i></button>
            </div>
            <div class="filter-panel" id="filterPanel">
                <div class="filter-group-title">分类筛选</div>
                <div class="filter-chips" id="filterChips"></div>
                <div class="panel-actions">
                    <button class="panel-btn" id="resetFiltersBtn">重置</button>
                </div>
            </div>
        </div>
        <div class="results-count" id="resultsCount"></div>

        <section class="resources-section">
            <div id="resources-cards-container">

            <div class="pagination" id="paginationControls" style="display: none;">
                <button class="page-btn" id="prevPageBtn">上一页</button>

            </div>
        </section>

    <div id="footer-placeholder"></div>

    <!-- 详情模态框 -->
    <div class="modal-overlay" id="details-modal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 id="modal-title"></h2>
                <button class="modal-close" id="modal-close-button"><i class="ri-close-line"></i></button>
            </div>
            <div class="modal-body">
                <div class="info-row">
                    <i class="ri-folder-zip-line"></i>
                    <div style="flex:1">
                        <div class="info-label">文件包标题</div>
                        <div class="info-value" id="modal-package-name"></div>
                    </div>
                </div>
                <div class="info-row">
                    <i class="ri-file-text-line"></i>
                    <div style="flex:1">
                        <div class="info-label">文件包描述</div>
                        <div class="info-value" id="modal-package-desc"></div>
                    </div>
                </div>
                <div class="info-row">
                    <i class="ri-lock-password-line"></i>
                    <div style="flex:1">
                        <div class="info-label">解压密码</div>
                        <div class="info-value code" id="modal-password"></div>
                    </div>
                </div>
                <div class="info-row">
                    <i class="ri-calendar-line"></i>
                    <div style="flex:1">
                        <div class="info-label">有效期</div>
                        <div class="info-value" id="modal-validity"></div>
                    </div>
                </div>
            </div>
            <div class="modal-footer">
                <button class="download-btn" id="downloadBtn">
                    <i class="ri-download-line"></i> 访问下载链接
                </button>
            </div>
        </div>
    </div>

    <script>
        // ---------- 组件加载 & 多语言 ----------
        window.locales = {};
        const componentBasePath = '../assets';
        async function loadComponent(filename, elementId) {
            const url = `${componentBasePath}/${filename}?t=${Date.now()}`;
            try {
                const res = await fetch(url);
                if (!res.ok) return;
                let html = await res.text();
                html = html.replace(/\.\/assets/g, '../assets');
                const temp = document.createElement('div');
                temp.innerHTML = html;
                const scripts = Array.from(temp.querySelectorAll('script'));
                scripts.forEach(s => s.remove());
                const placeholder = document.getElementById(elementId);
                if (!placeholder) return;
                while (temp.firstChild) placeholder.parentNode.insertBefore(temp.firstChild, placeholder);
                placeholder.remove();
                scripts.forEach(s => { const ns = document.createElement('script'); Array.from(s.attributes).forEach(attr => ns.setAttribute(attr.name, attr.value)); if (s.innerHTML) ns.text = s.innerHTML; document.body.appendChild(ns); });
            } catch (e) { console.error(e); }
        }
        window.applyTranslations = function() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (window.locales[key]) el.innerHTML = window.locales[key];
            });
        };
        window.setLanguage = async function(lang) {
            document.documentElement.setAttribute('lang', lang);
            localStorage.setItem('ksvg_ui_lang', lang);
            try {
                const g = await fetch(`../assets/${lang}.json?t=${Date.now()}`).catch(()=>null);
                const p = await fetch(`./${lang}.json?t=${Date.now()}`).catch(()=>null);
                let gd={}, pd={};
                if(g && g.ok) gd = await g.json();
                if(p && p.ok) pd = await p.json();
                window.locales = {...gd, ...pd};
            } catch(e) { console.warn(e); }
            window.applyTranslations();
            document.title = window.locales['tab_title_resources'] || "KSVG | 素材库";
            const lbls = { 'en-us':'English','zh-hans':'简体中文','zh-hant':'繁體中文' };
            document.querySelectorAll('.current-lang-text').forEach(s => s.textContent = lbls[lang] || lbls['zh-hans']);
            if(window.updateFooterLangDisplay) window.updateFooterLangDisplay(lang);
        };
        window.initLanguageSelection = async function(lang) {
            const modal = document.getElementById('langModal');
            if(modal) modal.classList.remove('show');
            await window.setLanguage(lang);
        };

        // ---------- CSV 解析 ----------
        function parseCSV(text) {
            const lines = text.trim().replace(/^\uFEFF/, "").split(/\r?\n/);
            if (lines.length < 2) return [];
            function parseCSVLine(line) {
                const result = [];
                let inQuote = false;
                let current = '';
                for (let i = 0; i < line.length; i++) {
                    const ch = line[i];
                    if (ch === '"') {
                        if (inQuote && line[i+1] === '"') { current += '"'; i++; }
                        else { inQuote = !inQuote; }
                    } else if (ch === ',' && !inQuote) { result.push(current); current = ''; }
                    else { current += ch; }
                }
                result.push(current);
                return result.map(f => f.trim());
            }
            const headers = parseCSVLine(lines[0]);
            const records = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line === '') continue;
                let values = parseCSVLine(line);
                while (values.length < headers.length) values.push('');
                const record = {};
                for (let j = 0; j < headers.length; j++) {
                    let val = values[j] || '';
                    if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
                    record[headers[j]] = val;
                }
                records.push(record);
            }
            return records;
        }

        function isExpired(expireTime) {
            if (!expireTime || expireTime === 'Unlimited' || expireTime === '永久') return false;
            const expireDate = new Date(expireTime);
            const now = new Date();
            return now > expireDate;
        }

        let allResources = [];
        let filteredData = [];
        let currentPage = 1;
        const ITEMS_PER_PAGE = 12;
        let activeFilters = new Set();
        let pendingSearchTerm = '';

        function extractFilterOptions(items) {
            const options = new Set();
            items.forEach(item => {
                const title = item['文件包标题'] || '';
                const match = title.match(/^(\d{4}|\D+)/);
                if (match) options.add(match[1]);
            });
            return Array.from(options).sort();
        }

        function applyFiltersAndSearch() {
            const searchTerm = pendingSearchTerm.toLowerCase();
            let filtered = allResources.filter(item => {
                if (searchTerm) {
                    const haystack = [item['文件包标题'], item['文件包描述']].join(' ').toLowerCase();
                    if (!haystack.includes(searchTerm)) return false;
                }
                if (activeFilters.size > 0) {
                    const title = item['文件包标题'] || '';
                    let match = false;
                    for (let filter of activeFilters) {
                        if (title.startsWith(filter)) { match = true; break; }
                    }
                    if (!match) return false;
                }
                return true;
            });
            filteredData = filtered;
            return filtered;
        }

        function renderPagination() {
            const total = filteredData.length;
            const totalPages = Math.ceil(total / ITEMS_PER_PAGE) || 1;
            const paginationDiv = document.getElementById('paginationControls');
            if (totalPages <= 1) { paginationDiv.style.display = 'none'; return; }
            paginationDiv.style.display = 'flex';
            const prevBtn = document.getElementById('prevPageBtn');
            const nextBtn = document.getElementById('nextPageBtn');
            const pageInfoSpan = document.getElementById('pageInfo');
            prevBtn.disabled = (currentPage === 1);
            nextBtn.disabled = (currentPage === totalPages);
            pageInfoSpan.textContent = `第 ${currentPage} / ${totalPages} 页`;
            if (!window._paginationBound) {
                window._paginationBound = true;
                prevBtn.onclick = () => { if (currentPage > 1) { currentPage--; renderCards(); } };
                nextBtn.onclick = () => { if (currentPage < totalPages) { currentPage++; renderCards(); } };
            }
        }

        function renderCards() {
            const container = document.getElementById('resources-cards-container');
            if (!container) return;
            applyFiltersAndSearch();
            const total = filteredData.length;
            const totalPages = Math.ceil(total / ITEMS_PER_PAGE);
            if (currentPage > totalPages) currentPage = Math.max(1, totalPages);
            const start = (currentPage-1) * ITEMS_PER_PAGE;
            const pageItems = filteredData.slice(start, start+ITEMS_PER_PAGE);
            
            const resultSpan = document.getElementById('resultsCount');
            resultSpan.textContent = total === allResources.length ? `共 ${total} 个素材包` : `找到 ${total} 个匹配（共 ${allResources.length} 个）`;
            
            if (pageItems.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="ri-inbox-line"></i><p>没有匹配的素材资源</p></div>`;
                renderPagination();
                return;
            }
            
            container.innerHTML = '';
            pageItems.forEach(item => {
                const title = item['文件包标题'] || '未命名';
                const desc = item['文件包描述'] || '';
                const expireTime = item['失效时间'] || 'Unlimited';
                const expired = isExpired(expireTime);
                const card = document.createElement('div');
                card.className = 'resource-card';
                card.dataset.id = title;
                card.innerHTML = `
                    <div class="card-header">
                        <div class="card-icon"><i class="ri-folder-zip-line"></i></div>
                        <div class="card-title">${escapeHtml(title)}</div>
                    </div>
                    <div class="card-desc">${escapeHtml(desc)}</div>
                    <div class="card-meta">
                        <span class="meta-status ${expired ? 'expired' : 'active'}">${expired ? '已失效' : '有效'}</span>
                        <span class="meta-date"><i class="ri-time-line"></i>${expireTime === 'Unlimited' ? '永久有效' : expireTime}</span>
                    </div>
                `;
                container.appendChild(card);
            });
            renderPagination();
        }

        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        function openModal(data) {
            const modal = document.getElementById('details-modal');
            if (!modal) return;
            const title = data['文件包标题'] || '';
            const desc = data['文件包描述'] || '';
            const password = data['密码'] || '无密码';
            const link = data['链接'] || '';
            const startTime = data['生效时间'] || 'Unlimited';
            const endTime = data['失效时间'] || 'Unlimited';
            let validityText = '';
            if (startTime === 'Unlimited' && endTime === 'Unlimited') validityText = '永久有效';
            else if (endTime === 'Unlimited') validityText = `自 ${startTime} 起有效`;
            else if (startTime === 'Unlimited') validityText = `有效期至 ${endTime}`;
            else validityText = `${startTime} 至 ${endTime}`;
            
            document.getElementById('modal-title').textContent = escapeHtml(title);
            document.getElementById('modal-package-name').textContent = escapeHtml(title);
            document.getElementById('modal-package-desc').textContent = escapeHtml(desc);
            document.getElementById('modal-password').textContent = password;
            document.getElementById('modal-validity').textContent = validityText;
            
            const downloadBtn = document.getElementById('downloadBtn');
            const expired = isExpired(endTime);
            if (expired || !link || link === '') {
                downloadBtn.disabled = true;
                downloadBtn.innerHTML = `<i class="ri-lock-line"></i> ${expired ? '资源已失效' : '暂无下载链接'}`;
            } else {
                downloadBtn.disabled = false;
                downloadBtn.innerHTML = `<i class="ri-download-line"></i> 访问下载链接`;
                downloadBtn.onclick = () => window.open(link, '_blank');
            }
            modal.classList.add('visible');
            document.body.style.overflow = 'hidden';
        }
        function closeModal() {
            const modal = document.getElementById('details-modal');
            if (modal) { modal.classList.remove('visible'); document.body.style.overflow = ''; }
        }

        function updateFilterChipsUI() {
            const options = extractFilterOptions(allResources);
            const container = document.getElementById('filterChips');
            if (!container) return;
            if (options.length === 0) { container.innerHTML = '<span style="font-size:0.75rem;color:#94a3b8;">暂无分类</span>'; return; }
            container.innerHTML = options.map(opt => `
                <button class="filter-chip ${activeFilters.has(opt) ? 'selected' : ''}" data-filter="${opt}">${opt}</button>
            `).join('');
            document.querySelectorAll('.filter-chip[data-filter]').forEach(btn => {
                btn.addEventListener('click', () => {
                    const val = btn.dataset.filter;
                    if (activeFilters.has(val)) activeFilters.delete(val);
                    else activeFilters.add(val);
                    updateFilterChipsUI();
                    currentPage = 1;
                    renderCards();
                });
            });
        }

        async function loadResources() {
            const container = document.getElementById('resources-cards-container');
            let overlay = document.getElementById('loading-overlay');
            if (!overlay && container) {
                const div = document.createElement('div'); div.id = 'loading-overlay'; div.innerHTML = '<div class="loader"></div>'; container.appendChild(div); overlay = div;
            }
            const controller = new AbortController();
            const tid = setTimeout(() => controller.abort(), 10000);
            try {
                const url = `../assets/media.csv?t=${Date.now()}`;
                const res = await fetch(url, { signal: controller.signal });
                if (!res.ok) throw new Error(`HTTP ${res.status}`);
                const text = await res.text();
                allResources = parseCSV(text);
                if (!allResources.length) throw new Error('无有效数据');
                activeFilters.clear();
                updateFilterChipsUI();
                applyFiltersAndSearch();
                currentPage = 1;
                renderCards();
            } catch (err) {
                console.error(err);
                if (container) {
                    container.innerHTML = `<div class="empty-state"><i class="ri-error-warning-line"></i><p>加载失败，请检查网络后重试</p><button class="retry-btn" id="retryLoadBtn">重新加载</button></div>`;
                    document.getElementById('retryLoadBtn')?.addEventListener('click', () => location.reload());
                }
            } finally {
                clearTimeout(tid);
                const ov = document.getElementById('loading-overlay');
                if (ov) ov.remove();
            }
        }

        function performSearch() {
            const input = document.getElementById('searchInput');
            pendingSearchTerm = input?.value || '';
            currentPage = 1;
            renderCards();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                loadComponent('us-banner.html', 'us-banner-placeholder'),
                loadComponent('navigation.html', 'navigation-placeholder'),
                loadComponent('footer.html', 'footer-placeholder')
            ]);
            const lang = localStorage.getItem('ksvg_ui_lang') || 'zh-hans';
            await window.setLanguage(lang);

            const searchInput = document.getElementById('searchInput');
            const searchClear = document.getElementById('searchClear');
            searchInput?.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); performSearch(); } });
            searchClear?.addEventListener('click', () => { searchInput.value = ''; pendingSearchTerm = ''; searchClear.classList.remove('visible'); currentPage = 1; renderCards(); searchInput.focus(); });
            searchInput?.addEventListener('input', () => { searchClear.classList.toggle('visible', searchInput.value.length > 0); });
            
            const filterPanel = document.getElementById('filterPanel');
            const filterToggle = document.getElementById('filterToggleBtn');
            filterToggle?.addEventListener('click', (e) => { e.stopPropagation(); filterPanel.classList.toggle('open'); filterToggle.classList.toggle('active', filterPanel.classList.contains('open')); });
            document.addEventListener('click', (e) => { if (!filterPanel?.contains(e.target) && e.target !== filterToggle && filterPanel?.classList.contains('open')) { filterPanel.classList.remove('open'); filterToggle?.classList.remove('active'); } });
            
            document.getElementById('resetFiltersBtn')?.addEventListener('click', () => { activeFilters.clear(); updateFilterChipsUI(); currentPage = 1; renderCards(); if (searchInput) { searchInput.value = ''; pendingSearchTerm = ''; searchClear?.classList.remove('visible'); } });
            
            document.getElementById('modal-close-button')?.addEventListener('click', closeModal);
            document.getElementById('details-modal')?.addEventListener('click', (e) => { if (e.target === e.currentTarget) closeModal(); });
            document.getElementById('resources-cards-container')?.addEventListener('click', (e) => {
                const card = e.target.closest('.resource-card');
                if (card) {
                    const title = card.dataset.id;
                    const data = allResources.find(i => i['文件包标题'] === title);
                    if (data) openModal(data);
                }
            });
            loadResources();
        });
    </script>
</body>

</html>
