<!DOCTYPE html>
<html lang="zh-CN">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta name="description" content="KSVG 组织招募 - 加入我们，共创未来">
    <title>KSVG | 组织招募</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Open+Sans:wght@700;800&family=Georgia&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@2.5.0/fonts/remixicon.css" rel="stylesheet">
    <link rel="icon" href="../assets/ksvg-logo.png?v=3" type="image/png">
    <link rel="shortcut icon" href="../assets/ksvg-logo.png?v=3" type="image/png">

    <style>
        :root {
            --brand-primary: #002b49;
            --brand-secondary: #c41230;
            --bg-color: #f4f6fa;
            --surface-color: #ffffff;
            --border-color: #e2e8f0;
            --text-dark: #0f172a;
            --text-muted: #475569;
            --text-light: #64748b;
            --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.03), 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.05), 0 2px 4px -1px rgba(0, 0, 0, 0.03);
            --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.05), 0 4px 6px -2px rgba(0, 0, 0, 0.02);
            --focus-ring: 0 0 0 3px rgba(0, 43, 73, 0.25);
            --status-ongoing-bg: #e6f7e6;
            --status-ongoing-text: #2e7d32;
            --status-ongoing-dot: #2e7d32;
            --status-ended-bg: #fee;
            --status-ended-text: #c62828;
            --status-ended-dot: #c62828;
            --status-planned-bg: #e8f0fe;
            --status-planned-text: #1565c0;
            --status-planned-dot: #1565c0;
        }

        *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }
        body { font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; background-color: var(--bg-color); color: var(--text-dark); line-height: 1.5; overflow-x: hidden; display: flex; flex-direction: column; min-height: 100vh; }
        a { text-decoration: none; color: inherit; }
        main { flex-grow: 1; }

a:focus-visible, button:focus-visible, input:focus-visible, textarea:focus-visible, select:focus-visible, [tabindex]:focus-visible {
    outline: 0.25rem solid #2491ff !important;
    outline-offset: 0.125rem !important;
    border-radius: 4px;
}
        .brand-strip { height: 4px; width: 100%; background: linear-gradient(90deg, var(--brand-primary) 60%, var(--brand-secondary) 100%); }

        /* 页面头部 */
        .page-header {
            max-width: 1200px;
            margin: 0 auto;
            padding: 60px 20px 0;
        }
        .page-header h1 {
            font-family: 'Open Sans', sans-serif;
            font-size: 3rem;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 12px;
            letter-spacing: 1px;
        }
        .page-header .page-subtitle {
            font-size: 1.05rem;
            color: #64748b;
            font-weight: 400;
            margin-bottom: 30px;
            line-height: 1.5;
        }
        .page-header .header-divider {
            width: 100%;
            height: 1px;
            background: linear-gradient(90deg, #e2e8f0 0%, #cbd5e1 50%, transparent 100%);
            margin-bottom: 40px;
        }

        /* 工具栏 */
        .toolbar {
            max-width: 1200px;
            margin: 0 auto 20px;
            padding: 0 20px;
            display: flex;
            gap: 12px;
            align-items: center;
            flex-wrap: wrap;
            position: relative;
        }
        .search-wrapper { flex: 1; min-width: 240px; position: relative; }
        .search-wrapper i { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: #94a3b8; font-size: 1rem; pointer-events: none; }
        .search-input {
            width: 100%;
            padding: 10px 14px 10px 38px;
            border: 1px solid var(--border-color);
            border-radius: 8px;
            font-size: 0.85rem;
            font-family: inherit;
            background: var(--surface-color);
            transition: all 0.2s;
        }
        .search-input:focus { outline: none; border-color: var(--brand-primary); box-shadow: var(--focus-ring); }
        .search-clear {
            position: absolute; right: 10px; top: 50%; transform: translateY(-50%);
            background: none; border: none; color: #94a3b8; cursor: pointer; font-size: 1rem;
            padding: 4px; display: none; border-radius: 50%;
        }
        .search-clear:hover { color: var(--text-dark); background: #f1f5f9; }
        .search-clear.visible { display: flex; align-items: center; justify-content: center; }

        .toolbar-actions { display: flex; gap: 8px; align-items: center; }
        .icon-btn {
            width: 38px; height: 38px; border-radius: 8px; border: 1px solid var(--border-color);
            background: var(--surface-color); color: var(--text-muted); cursor: pointer;
            display: flex; align-items: center; justify-content: center; font-size: 1.1rem;
            transition: all 0.2s;
        }
        .icon-btn:hover { background: #e2e8f0; color: var(--brand-primary); border-color: var(--brand-primary); }

        /* 筛选面板 */
        .filter-panel {
            position: absolute; top: calc(100% + 8px); right: 20px; width: 280px;
            background: var(--surface-color); border: 1px solid var(--border-color);
            border-radius: 12px; box-shadow: var(--shadow-lg); z-index: 100;
            display: none; padding: 20px; flex-direction: column; gap: 16px;
        }
        .filter-panel.open { display: flex; }
        .filter-group-title { font-size: 0.7rem; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; color: var(--text-muted); margin-bottom: 8px; }
        .filter-chips { display: flex; flex-wrap: wrap; gap: 6px; }
        .filter-chip {
            padding: 5px 12px; border-radius: 20px; border: 1px solid var(--border-color);
            background: var(--surface-color); font-size: 0.75rem; font-weight: 500;
            cursor: pointer; transition: all 0.2s; color: var(--text-muted);
        }
        .filter-chip:hover { border-color: var(--brand-primary); background: #f0f4f8; }
        .filter-chip.selected { background: var(--brand-primary); color: white; border-color: var(--brand-primary); }
        .panel-actions { display: flex; justify-content: flex-end; gap: 10px; margin-top: 8px; }
        .panel-btn {
            padding: 6px 16px; border-radius: 20px; font-size: 0.75rem; font-weight: 600;
            cursor: pointer; border: none; background: #f1f5f9; color: var(--text-dark);
        }
        .panel-btn.primary { background: var(--brand-primary); color: white; }
        .panel-btn:hover { opacity: 0.85; }

        .results-count {
            max-width: 1200px; margin: 0 auto 16px; padding: 0 20px;
            font-size: 0.8rem; color: var(--text-muted);
        }

        /* 列表视图 */
        .recruiting-section {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 20px 80px;
        }
        #recruiting-cards-container {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .recruiting-card {
            background: var(--surface-color);
            border-radius: 12px;
            border: 1px solid var(--border-color);
            padding: 16px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .recruiting-card:hover {
            transform: translateY(-1px);
            box-shadow: var(--shadow-md);
            border-color: var(--brand-primary);
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            margin-bottom: 10px;
            flex-wrap: wrap;
        }
        .card-header h3 {
            font-size: 1rem;
            font-weight: 700;
            color: var(--text-dark);
            margin: 0;
            flex: 1;
        }
        .status-dot {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 0.7rem;
            font-weight: 600;
            padding: 3px 10px;
            border-radius: 20px;
            flex-shrink: 0;
        }
        .status-dot::before {
            content: '';
            width: 6px;
            height: 6px;
            border-radius: 50%;
        }
        .status-ongoing { background: var(--status-ongoing-bg); color: var(--status-ongoing-text); }
        .status-ongoing::before { background: var(--status-ongoing-dot); }
        .status-ended { background: var(--status-ended-bg); color: var(--status-ended-text); }
        .status-ended::before { background: var(--status-ended-dot); }
        .status-planned { background: var(--status-planned-bg); color: var(--status-planned-text); }
        .status-planned::before { background: var(--status-planned-dot); }

        .card-info-row {
            display: flex;
            flex-wrap: wrap;
            gap: 16px;
            margin-bottom: 10px;
        }
        .info-item {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.8rem;
            color: var(--text-muted);
        }
        .info-item i {
            font-size: 0.9rem;
            color: #94a3b8;
        }
        .date-range {
            display: inline-flex;
            align-items: center;
            flex-wrap: wrap;
            gap: 4px;
        }
        .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 10px;
            border-top: 1px solid var(--border-color);
        }
        .org-badge {
            font-size: 0.75rem;
            font-weight: 500;
            color: var(--brand-primary);
            background: #f0f4f8;
            padding: 4px 12px;
            border-radius: 20px;
        }
        .arrow-icon {
            font-size: 1rem;
            color: #94a3b8;
            transition: transform 0.2s;
        }
        .recruiting-card:hover .arrow-icon {
            transform: translateX(3px);
            color: var(--brand-primary);
        }

        @media (max-width: 768px) {
            .page-header { padding: 40px 20px 0; }
            .page-header h1 { font-size: 2.2rem; }
            .page-header .page-subtitle { font-size: 0.9rem; }
            .filter-panel { width: calc(100vw - 40px); right: 0; left: auto; }
            .card-header { flex-direction: column; align-items: flex-start; gap: 8px; }
            .card-info-row { flex-direction: column; gap: 8px; }
            .recruiting-card { padding: 14px 16px; }
        }

        /* 分页 */
        .pagination {
            display: flex;
            justify-content: center;
            align-items: center;
            gap: 16px;
            margin-top: 40px;
        }
        .page-btn {
            background: white;
            border: 1px solid var(--border-color);
            padding: 8px 20px;
            border-radius: 30px;
            font-weight: 600;
            font-size: 0.8rem;
            cursor: pointer;
            transition: all 0.2s;
        }
        .page-btn:hover:not(:disabled) {
            background: var(--brand-primary);
            color: white;
            border-color: var(--brand-primary);
        }
        .page-btn:disabled { opacity: 0.4; cursor: not-allowed; }
        .page-info {
            font-size: 0.85rem;
            color: var(--text-muted);
            background: #f1f5f9;
            padding: 6px 16px;
            border-radius: 30px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }
        .empty-state i { font-size: 2.5rem; color: #cbd5e1; margin-bottom: 16px; display: block; }
        .retry-btn {
            background: var(--brand-primary);
            color: white;
            border: none;
            padding: 8px 24px;
            border-radius: 30px;
            font-weight: 600;
            cursor: pointer;
            margin-top: 16px;
        }

        #loading-overlay {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(244, 246, 250, 0.9); backdrop-filter: blur(4px);
            display: flex; justify-content: center; align-items: center; z-index: 10;
            border-radius: 12px;
        }
        .loader {
            border: 3px solid #e2e8f0;
            border-top: 3px solid var(--brand-primary);
            border-radius: 50%;
            width: 36px;
            height: 36px;
            animation: spin 0.8s linear infinite;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* ========== 模态框 ========== */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 2000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s;
            display: flex;
            justify-content: center;
            align-items: center;
        }
        .modal-overlay.visible {
            opacity: 1;
            pointer-events: auto;
        }
        .modal-content {
            background: var(--surface-color);
            border-radius: 16px;
            width: 90%;
            max-width: 520px;
            max-height: 85vh;
            display: flex;
            flex-direction: column;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2);
            transform: scale(0.96);
            opacity: 0;
            transition: transform 0.2s, opacity 0.2s;
            overflow: hidden;
        }
        .modal-overlay.visible .modal-content {
            transform: scale(1);
            opacity: 1;
        }
        .modal-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 12px;
            padding: 20px 24px 12px;
            border-bottom: 1px solid #f0f0f0;
            flex-shrink: 0;
        }
        .modal-header h2 {
            font-size: 1.2rem;
            font-weight: 700;
            margin: 0;
            flex: 1;
        }
        .modal-close {
            background: none;
            border: none;
            width: 32px;
            height: 32px;
            border-radius: 8px;
            cursor: pointer;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            justify-content: center;
            flex-shrink: 0;
        }
        .modal-close:hover {
            background: #f1f5f9;
        }
        .modal-body {
            flex: 1;
            overflow-y: auto;
            padding: 20px 24px;
        }
        .info-row {
            display: flex;
            align-items: flex-start;
            gap: 12px;
            margin-bottom: 16px;
        }
        .info-row i {
            font-size: 1.1rem;
            color: var(--brand-primary);
            width: 24px;
            margin-top: 2px;
            flex-shrink: 0;
        }
        .info-label {
            font-size: 0.7rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #94a3b8;
            margin-bottom: 4px;
        }
        .info-value {
            font-size: 0.9rem;
            color: var(--text-dark);
            word-break: break-word;
            line-height: 1.5;
        }
        .modal-footer {
            padding: 16px 24px 24px;
            border-top: 1px solid #f0f0f0;
            display: flex;
            justify-content: center;
            flex-shrink: 0;
        }
        .apply-btn {
            padding: 12px 28px;
            border-radius: 30px;
            border: none;
            font-size: 0.9rem;
            font-weight: 700;
            cursor: pointer;
            background: var(--brand-primary);
            color: white;
            display: inline-flex;
            align-items: center;
            gap: 8px;
            transition: all 0.2s;
        }
        .apply-btn:hover:not(:disabled) {
            background: #001f35;
            transform: translateY(-1px);
        }
        .apply-btn:disabled {
            background: #cbd5e1;
            color: #64748b;
            cursor: not-allowed;
        }
    </style>
</head>

<body>

    <script>
        // ---------- 组件加载 & 多语言 ----------
        window.locales = {};
        const componentBasePath = '../assets';
        async function loadComponent(filename, elementId) {
            const url = `${componentBasePath}/${filename}?t=${Date.now()}`;
            try {
                const res = await fetch(url);
                if (!res.ok) return;
                let html = await res.text();
                html = html.replace(/\.\/assets/g, '../assets');
                const temp = document.createElement('div');
                temp.innerHTML = html;
                const scripts = Array.from(temp.querySelectorAll('script'));
                scripts.forEach(s => s.remove());
                const placeholder = document.getElementById(elementId);
                if (!placeholder) return;
                while (temp.firstChild) placeholder.parentNode.insertBefore(temp.firstChild, placeholder);
                placeholder.remove();
                scripts.forEach(s => { const ns = document.createElement('script'); Array.from(s.attributes).forEach(attr => ns.setAttribute(attr.name, attr.value)); if (s.innerHTML) ns.text = s.innerHTML; document.body.appendChild(ns); });
            } catch (e) { console.error(e); }
        }
        window.applyTranslations = function() {
            document.querySelectorAll('[data-i18n]').forEach(el => {
                const key = el.getAttribute('data-i18n');
                if (window.locales[key]) el.innerHTML = window.locales[key];
            });
        };
        window.setLanguage = async function(lang) {
            document.documentElement.setAttribute('lang', lang);
            localStorage.setItem('ksvg_ui_lang', lang);
            try {
                const g = await fetch(`../assets/${lang}.json?t=${Date.now()}`).catch(()=>null);
                const p = await fetch(`./${lang}.json?t=${Date.now()}`).catch(()=>null);
                let gd={}, pd={};
                if(g && g.ok) gd = await g.json();
                if(p && p.ok) pd = await p.json();
                window.locales = {...gd, ...pd};
            } catch(e) { console.warn(e); }
            window.applyTranslations();
            document.title = window.locales['tab_title_recruiting'] || "KSVG | 组织招募";
            const lbls = { 'en-us':'English','zh-hans':'简体中文','zh-hant':'繁體中文' };
            document.querySelectorAll('.current-lang-text').forEach(s => s.textContent = lbls[lang] || lbls['zh-hans']);
            if(window.updateFooterLangDisplay) window.updateFooterLangDisplay(lang);
        };
        window.initLanguageSelection = async function(lang) {
            const modal = document.getElementById('langModal');
            if(modal) modal.classList.remove('show');
            await window.setLanguage(lang);
        };

        // ---------- CSV 解析 ----------
        function parseCSV(text) {
            const lines = text.trim().replace(/^\uFEFF/, "").split(/\r?\n/);
            if (lines.length < 2) return [];
            function parseCSVLine(line) {
                const result = [];
                let inQuote = false;
                let current = '';
                for (let i = 0; i < line.length; i++) {
                    const ch = line[i];
                    if (ch === '"') {
                        if (inQuote && line[i+1] === '"') { current += '"'; i++; }
                        else { inQuote = !inQuote; }
                    } else if (ch === ',' && !inQuote) { result.push(current); current = ''; }
                    else { current += ch; }
                }
                result.push(current);
                return result.map(f => f.trim());
            }
            const headers = parseCSVLine(lines[0]);
            const records = [];
            for (let i = 1; i < lines.length; i++) {
                const line = lines[i].trim();
                if (line === '') continue;
                let values = parseCSVLine(line);
                while (values.length < headers.length) values.push('');
                const record = {};
                for (let j = 0; j < headers.length; j++) {
                    let val = values[j] || '';
                    if (val.startsWith('"') && val.endsWith('"')) val = val.slice(1, -1);
                    record[headers[j]] = val;
                }
                records.push(record);
            }
            return records;
        }

        function parseDateString(dateStr) {
            const m = dateStr.match(/(\d{4})年(\d{1,2})月(\d{1,2})日/);
            if(!m) return null;
            return new Date(parseInt(m[1]), parseInt(m[2])-1, parseInt(m[3]));
        }

        function getRecruitmentStatus(startStr, endStr) {
            const now = new Date(); now.setHours(0,0,0,0);
            const start = parseDateString(startStr);
            const end = parseDateString(endStr);
            if(!start || !end) return { text:'日期无效', class:'ended' };
            const endDay = new Date(end); endDay.setHours(23,59,59,999);
            if(now < start) return { text:'计划中', class:'planned' };
            if(now > endDay) return { text:'已结束', class:'ended' };
            return { text:'进行中', class:'ongoing' };
        }

        // 状态优先级映射：ongoing(0) > planned(1) > ended(2)
        function getStatusPriority(statusClass) {
            const map = { 'ongoing': 0, 'planned': 1, 'ended': 2 };
            return map[statusClass] ?? 2;
        }

        let allRecruitments = [];
        let filteredData = [];
        let currentPage = 1;
        const ITEMS_PER_PAGE = 10;
        let activeFilters = {
            status: ['ongoing', 'planned', 'ended'],
            category: ['定期招募', '长期招募'],
            org: ['昆山康桥学生会', 'KSVG']
        };
        let pendingSearchTerm = '';

        function applyFiltersAndSearch() {
            const searchTerm = pendingSearchTerm.toLowerCase();
            // 1. 先筛选
            let filtered = allRecruitments.filter(item => {
                const status = getRecruitmentStatus(item['开始时间'], item['结束时间']);
                if(!activeFilters.status.includes(status.class)) return false;
                if(!activeFilters.category.includes(item['类别'])) return false;
                if(!activeFilters.org.includes(item['归属组织'])) return false;
                if(searchTerm) {
                    const haystack = [item['场次名称'], item['副标题'], item['招募对象'], item['正文'], item['归属组织']].join(' ').toLowerCase();
                    if(!haystack.includes(searchTerm)) return false;
                }
                return true;
            });

            // 2. 排序：先按状态优先级（进行中 > 计划中 > 已结束），再按开始时间升序（越早的开始时间越靠前）
            filtered.sort((a, b) => {
                const statusA = getRecruitmentStatus(a['开始时间'], a['结束时间']);
                const statusB = getRecruitmentStatus(b['开始时间'], b['结束时间']);
                const priorityA = getStatusPriority(statusA.class);
                const priorityB = getStatusPriority(statusB.class);
                if (priorityA !== priorityB) {
                    return priorityA - priorityB;
                }
                // 同状态内按开始时间升序（越早的越靠前）
                const dateA = parseDateString(a['开始时间']);
                const dateB = parseDateString(b['开始时间']);
                if (dateA && dateB) return dateA - dateB;
                if (dateA) return -1;
                if (dateB) return 1;
                return 0;
            });

            filteredData = filtered;
            return filtered;
        }

        function renderPagination() {
            const total = filteredData.length;
            const totalPages = Math.ceil(total / ITEMS_PER_PAGE) || 1;
            const paginationDiv = document.getElementById('paginationControls');
            if(totalPages <= 1) {
                paginationDiv.style.display = 'none';
                return;
            }
            paginationDiv.style.display = 'flex';
            const prevBtn = document.getElementById('prevPageBtn');
            const nextBtn = document.getElementById('nextPageBtn');
            const pageInfoSpan = document.getElementById('pageInfo');
            prevBtn.disabled = (currentPage === 1);
            nextBtn.disabled = (currentPage === totalPages);
            pageInfoSpan.textContent = `第 ${currentPage} / ${totalPages} 页`;
            if(!window._paginationBound) {
                window._paginationBound = true;
                prevBtn.onclick = () => { if(currentPage > 1) { currentPage--; renderCards(); } };
                nextBtn.onclick = () => { if(currentPage < totalPages) { currentPage++; renderCards(); } };
            }
        }

        function renderCards() {
            const container = document.getElementById('recruiting-cards-container');
            if(!container) return;
            applyFiltersAndSearch();
            const total = filteredData.length;
            const totalPages = Math.ceil(total / ITEMS_PER_PAGE);
            if(currentPage > totalPages) currentPage = Math.max(1, totalPages);
            const start = (currentPage-1) * ITEMS_PER_PAGE;
            const pageItems = filteredData.slice(start, start+ITEMS_PER_PAGE);
            
            const resultSpan = document.getElementById('resultsCount');
            resultSpan.textContent = total === allRecruitments.length ? `共 ${total} 个招募` : `找到 ${total} 个匹配（共 ${allRecruitments.length} 个）`;
            
            if(pageItems.length === 0) {
                container.innerHTML = `<div class="empty-state"><i class="ri-information-line"></i><p>没有匹配的招募信息</p></div>`;
                renderPagination();
                return;
            }
            
            container.innerHTML = '';
            pageItems.forEach(item => {
                const status = getRecruitmentStatus(item['开始时间'], item['结束时间']);
                const startDate = item['开始时间'] || '';
                const endDate = item['结束时间'] || '';
                const card = document.createElement('div');
                card.className = 'recruiting-card';
                card.dataset.id = item['自动编号'];
                card.innerHTML = `
                    <div class="card-header">
                        <h3>${escapeHtml(item['场次名称'])}</h3>
                        <span class="status-dot status-${status.class}">${status.text}</span>
                    </div>
                    <div class="card-info-row">
                        <div class="info-item">
                            <i class="ri-calendar-line"></i>
                            <span class="date-range">
                                <span>${startDate}</span>
                                <span>—</span>
                                <span>${endDate}</span>
                            </span>
                        </div>
                        <div class="info-item">
                            <i class="ri-group-line"></i>
                            <span>${escapeHtml(item['招募对象'])}</span>
                        </div>
                    </div>
                    <div class="card-footer">
                        <span class="org-badge">${escapeHtml(item['归属组织'])}</span>
                        <i class="ri-arrow-right-s-line arrow-icon"></i>
                    </div>
                `;
                container.appendChild(card);
            });
            renderPagination();
        }

        function escapeHtml(str) { if(!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }

        function openModal(data) {
            const modal = document.getElementById('details-modal');
            if(!modal) return;
            const status = getRecruitmentStatus(data['开始时间'], data['结束时间']);
            const badge = document.getElementById('modal-status-badge');
            badge.textContent = status.text;
            badge.className = `status-dot status-${status.class}`;
            
            document.getElementById('modal-title').textContent = escapeHtml(data['场次名称'] || '');
            document.getElementById('modal-id').textContent = data['自动编号'] || '—';
            document.getElementById('modal-dates').textContent = `${data['开始时间']} 至 ${data['结束时间']}`;
            document.getElementById('modal-audience').textContent = escapeHtml(data['招募对象'] || '—');
            document.getElementById('modal-category').textContent = data['类别'] || '—';
            document.getElementById('modal-org').textContent = data['归属组织'] || '—';
            document.getElementById('modal-interview').textContent = data['是否需要面试'] || '—';
            document.getElementById('modal-body-content').innerHTML = (data['正文'] || '').replace(/\\n/g, '<br>');
            
            const applyBtn = document.getElementById('applyBtn');
            const link = data['问卷链接']?.trim();
            const isEnded = status.class === 'ended';
            const noLink = !link || link === 'N/A' || link === '';
            if(isEnded || noLink) {
                applyBtn.disabled = true;
                applyBtn.innerHTML = `<i class="ri-lock-line"></i> <span>${isEnded ? '招募已结束' : '暂无问卷链接'}</span>`;
            } else {
                applyBtn.disabled = false;
                applyBtn.innerHTML = `<i class="ri-external-link-line"></i> <span>访问招募问卷</span>`;
                applyBtn.onclick = () => window.open(link, '_blank');
            }
            modal.classList.add('visible');
            document.body.style.overflow = 'hidden';
        }
        function closeModal() {
            const modal = document.getElementById('details-modal');
            if(modal) { modal.classList.remove('visible'); document.body.style.overflow = ''; }
        }

        function updateFilterChips() {
            document.querySelectorAll('.filter-chip[data-type="status"]').forEach(c => c.classList.toggle('selected', activeFilters.status.includes(c.dataset.value)));
            document.querySelectorAll('.filter-chip[data-type="category"]').forEach(c => c.classList.toggle('selected', activeFilters.category.includes(c.dataset.value)));
            document.querySelectorAll('.filter-chip[data-type="org"]').forEach(c => c.classList.toggle('selected', activeFilters.org.includes(c.dataset.value)));
        }

        async function loadRecruitments() {
            const container = document.getElementById('recruiting-cards-container');
            let overlay = document.getElementById('loading-overlay');
            if(!overlay && container) {
                const div = document.createElement('div'); div.id='loading-overlay'; div.innerHTML='<div class="loader"></div>'; container.appendChild(div); overlay=div;
            }
            const controller = new AbortController();
            const tid = setTimeout(()=>controller.abort(), 10000);
            try {
                const url = `../assets/recruiting.csv?t=${Date.now()}`;
                const res = await fetch(url, { signal: controller.signal });
                if(!res.ok) throw new Error(`HTTP ${res.status}`);
                const text = await res.text();
                allRecruitments = parseCSV(text);
                if(!allRecruitments.length) throw new Error('无有效数据');
                applyFiltersAndSearch();
                currentPage = 1;
                renderCards();
            } catch(err) {
                console.error(err);
                if(container) {
                    container.innerHTML = `<div class="empty-state"><i class="ri-error-warning-line"></i><p>加载失败，请检查网络后重试</p><button class="retry-btn" id="retryLoadBtn">重新加载</button></div>`;
                    document.getElementById('retryLoadBtn')?.addEventListener('click',()=>location.reload());
                }
            } finally {
                clearTimeout(tid);
                const ov = document.getElementById('loading-overlay');
                if(ov) ov.remove();
            }
        }

        function performSearch() {
            const input = document.getElementById('searchInput');
            pendingSearchTerm = input?.value || '';
            currentPage = 1;
            renderCards();
        }

        document.addEventListener('DOMContentLoaded', async () => {
            await Promise.all([
                loadComponent('us-banner.html','us-banner-placeholder'),
                loadComponent('navigation.html','navigation-placeholder'),
                loadComponent('footer.html','footer-placeholder')
            ]);
            const lang = localStorage.getItem('ksvg_ui_lang') || 'zh-hans';
            await window.setLanguage(lang);

            const searchInput = document.getElementById('searchInput');
            const searchClear = document.getElementById('searchClear');
            searchInput?.addEventListener('keypress', (e) => { if (e.key === 'Enter') { e.preventDefault(); performSearch(); } });
            searchClear?.addEventListener('click', ()=>{
                searchInput.value = '';
                pendingSearchTerm = '';
                searchClear.classList.remove('visible');
                currentPage = 1;
                renderCards();
                searchInput.focus();
            });
            searchInput?.addEventListener('input', () => { searchClear.classList.toggle('visible', searchInput.value.length > 0); });
            
            const filterPanel = document.getElementById('filterPanel');
            const filterToggle = document.getElementById('filterToggleBtn');
            filterToggle?.addEventListener('click', (e)=>{
                e.stopPropagation();
                filterPanel.classList.toggle('open');
                filterToggle.classList.toggle('active', filterPanel.classList.contains('open'));
            });
            document.addEventListener('click', (e)=>{
                if(!filterPanel?.contains(e.target) && e.target !== filterToggle && filterPanel?.classList.contains('open')) {
                    filterPanel.classList.remove('open');
                    filterToggle?.classList.remove('active');
                }
            });
            
            document.getElementById('filterPanel')?.addEventListener('click', (e)=>{
                const chip = e.target.closest('.filter-chip');
                if(!chip) return;
                const type = chip.dataset.type;
                const val = chip.dataset.value;
                let arr;
                if(type==='status') arr = activeFilters.status;
                else if(type==='category') arr = activeFilters.category;
                else if(type==='org') arr = activeFilters.org;
                else return;
                const idx = arr.indexOf(val);
                if(idx>-1) arr.splice(idx,1);
                else arr.push(val);
                updateFilterChips();
                currentPage = 1;
                renderCards();
            });
            
            document.getElementById('resetFiltersBtn')?.addEventListener('click', ()=>{
                activeFilters = { status:['ongoing','planned','ended'], category:['定期招募','长期招募'], org:['昆山康桥学生会','KSVG'] };
                updateFilterChips();
                if(searchInput) searchInput.value = '';
                pendingSearchTerm = '';
                if(searchClear) searchClear.classList.remove('visible');
                currentPage = 1;
                renderCards();
            });
            
            document.getElementById('modal-close-button')?.addEventListener('click', closeModal);
            document.getElementById('details-modal')?.addEventListener('click', (e)=>{ if(e.target===e.currentTarget) closeModal(); });
            document.getElementById('recruiting-cards-container')?.addEventListener('click', (e)=>{
                const card = e.target.closest('.recruiting-card');
                if(card) {
                    const id = card.dataset.id;
                    const data = allRecruitments.find(i=>i['自动编号']===id);
                    if(data) openModal(data);
                }
            });
            loadRecruitments();
        });
    </script>
